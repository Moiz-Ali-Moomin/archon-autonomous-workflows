target-version = "py312"
line-length = 100

[lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
    "E501",   # line too long – handled by formatter
    "B008",   # function calls in default args (FastAPI depends)
]

[lint.per-file-ignores]
"archon/*" = ["UP"]
"archon/cli.py" = ["UP", "I001", "E402"]   # sys.path manipulation must precede local imports

[format]
quote-style = "double"
indent-style = "space"
