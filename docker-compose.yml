x-app-env: &app-env
  DB_HOST: postgres
  DB_NAME: agent
  DB_USER: agent_user
  DB_PASSWORD: agent_pass
  REDIS_URL: redis://redis:6379/0
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: agentpassword
  OLLAMA_URL: http://ollama:11434
  OUTPUT_DIR: /app/output
  CODE_TIMEOUT: "30"
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
  AGENT_API_KEY: ${AGENT_API_KEY}

x-app-depends: &app-depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  neo4j:
    condition: service_healthy
  ollama:
    condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_pass
      POSTGRES_DB: agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5.26-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/agentpassword
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  api:
    build: .
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2 --access-log
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      <<: *app-depends
    volumes:
      - output_data:/app/output
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: .
    restart: unless-stopped
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2 --max-tasks-per-child=50
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      <<: *app-depends
    volumes:
      - output_data:/app/output
    deploy:
      resources:
        limits:
          memory: 512M

  flower:
    build: .
    restart: unless-stopped
    command: celery -A tasks.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  ollama_data:
  output_data:
